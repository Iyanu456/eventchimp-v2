services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventchimp-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: eventchimp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: eventchimp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
